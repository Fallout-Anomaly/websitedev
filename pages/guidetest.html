    <!-- Complete override styles -->
    <style>
        /* Reset body and html to ensure full width */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow-x: hidden !important;
        }
        
        /* Layout structure */
        body {
            display: flex !important;
            flex-direction: column !important;
        }
        
        /* Navigation styles */
        .nav-menu {
            width: 100% !important;
            flex-shrink: 0 !important;
        }
        
        /* Main content area - takes all available space */
        .main-content {
            flex: 1 0 auto !important;
            width: 100% !important;
            max-width: none !important;
            padding: 0 !important;
            margin: 0 !important;
            display: flex !important;
            flex-direction: column !important;
        }
        
        /* Guide container - takes all available space */
        .guide-embed-container {
            flex: 1 !important;
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
            display: flex !important;
            flex-direction: column !important;
        }
        
        /* Iframe - fills its container */
        .guide-embed-iframe {
            flex: 1 !important;
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        
        /* Footer styles */
        .fallout-footer {
            width: 100% !important;
            flex-shrink: 0 !important;
            margin: 0 !important;
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="pip-os-boot">
            <div class="pip-os-line visible">FALLOUT ANOMALY INSTALLATION GUIDE</div>
            <div class="pip-os-line visible">Loading documentation...</div>
            <div class="pip-os-line visible">Please stand by...</div>
        </div>
        <div class="continue-prompt" id="continuePrompt">PRESS ANY KEY TO CONTINUE</div>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
        <div class="nav-menu-container">
            <a href="../index.html" class="nav-logo">
                <span class="icon">☢️</span>FALLOUT ANOMALY
            </a>
            <div id="nav-links-container">
                <ul class="nav-links">
                    <li><a href="../index.html" class="nav-link">Home</a></li>
                    <li><a href="guide.html" class="nav-link active">Guide</a></li>
                    <li><a href="https://discord.gg/ECuAthsdwJ" class="nav-link" target="_blank">Discord</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content visible">
        <div class="guide-embed-container visible">
            <iframe 
                src="https://falloutanomaly.guildtag.com/readme/" 
                title="Fallout Anomaly Installation Guide" 
                class="guide-embed-iframe"
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </main>

    <footer class="fallout-footer">
        <p>© 2025 Fallout Anomaly Team. All rights reserved. This guide is not affiliated with Bethesda Softworks.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Make sure pip-os-lines are visible
            const pipOsLines = document.querySelectorAll('.pip-os-line');
            pipOsLines.forEach(function(line) {
                line.classList.add('visible');
            });
            
            // Handle continue prompt
            function hideLoadingScreen() {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.removeEventListener('keydown', hideLoadingScreen);
                document.getElementById('continuePrompt').removeEventListener('click', hideLoadingScreen);
            }
            
            document.addEventListener('keydown', hideLoadingScreen);
            document.getElementById('continuePrompt').addEventListener('click', hideLoadingScreen);
            
            // Auto-hide after 5 seconds
            setTimeout(hideLoadingScreen, 5000);
            
            // Make sure all containers are visible
            document.querySelector('.main-content').classList.add('visible');
            document.querySelector('.guide-embed-container').classList.add('visible');
        });
    </script>
</body>
</html>
